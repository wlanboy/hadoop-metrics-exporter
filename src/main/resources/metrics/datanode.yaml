# Reference: https://hadoop.apache.org/docs/current/hadoop-project-dist/hadoop-common/Metrics.html
lowercaseOutputName: true
lowercaseOutputLabel: false
rules:
  Hadoop:service=DataNode,name=(DataNodeVolume)-(.+):
    - pattern: (.+)(NumOps|AvgTime)
      type: GAUSE
      name: $1_$4
      labels:
        datadir: $2
        type: $3
    - pattern: ^(Total)(.+)
      type: GAUSE
      name: $1_$3
      labels:
        datadir: $2
        type: $4

  Hadoop:service=DataNode,name=(FSDatasetState)(?:-([a-zA-Z0-9-]+))?$:
    - pattern: ^((?!tag|modelerType|name).*)
      type: GAUSE
      name: $1
      labels:
        storage: $2
        type: $3

  Hadoop:service=DataNode,name=(DataNodeInfo)$:
    - pattern: ^(XceiverCount|XmitsInProgress)$
      type: GAUSE
      name: $2
      help: "$2 metric from DataNodeInfo"

  Hadoop:service=DataNode,name=(DataNodeActivity).*:
    - pattern: ^((?!tag|modelerType|name).*)
      type: GAUSE
      name: $1
      labels:
        type: $2
