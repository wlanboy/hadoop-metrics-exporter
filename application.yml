# Exporter configuration.
# Mirrors the "jmx:" section of the original Python hadoop_exporter config.yaml:
# a list of clusters, each with a map of service name -> list of JMX urls.
# Supported service names: namenode, datanode, journalnode, resourcemanager, nodemanager, hiveserver2
exporter:
  cluster-name: hadoop_cluster
  path: /metrics
  # metrics-dir: /exporter/metrics   # optional: override the classpath metrics/*.yaml rule directory
  jmx: []
